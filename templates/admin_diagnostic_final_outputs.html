<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Итог экспресс-диагностики — AIha</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #0b1020;
            color: #ffffff;
        }

        a {
            color: #8fd8ff;
            text-decoration: none;
            font-weight: bold;
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: #121a30;
            border: 1px solid #334;
            padding: 24px;
            margin-bottom: 24px;
            border-radius: 14px;
        }

        .meta {
            color: #9fb3d9;
            line-height: 1.6;
            margin-bottom: 18px;
        }

        textarea {
            width: 100%;
            min-height: 420px;
            box-sizing: border-box;
            padding: 18px;
            background: #0f172b;
            color: #d9e4ff;
            border: 1px solid #2c3550;
            border-radius: 12px;
            font: 14px/1.55 Consolas, monospace;
            resize: vertical;
        }

        button {
            margin: 12px 0 18px;
            padding: 11px 18px;
            border: 0;
            cursor: pointer;
            background: #5dd6a7;
            color: #06130e;
            font-weight: bold;
            border-radius: 10px;
        }

        .links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .links a {
            display: inline-block;
            padding: 10px 14px;
            border: 1px solid #2c3550;
            background: #0f172b;
            border-radius: 10px;
        }
    </style>
</head>

<body>
<div class="page">

    <p>
        <a href="/admin/leads/{{ diagnostic.lead_id }}">
            ← Назад к карточке лида
        </a>
    </p>

    <h1>Итог экспресс-диагностики</h1>

    <div class="meta">
        Diagnostic #{{ diagnostic.id }} |
        Компания: {{ diagnostic.company or "не указано" }} |
        Статус: {{ diagnostic.status or "не указано" }}
    </div>

    <div class="links">
        <a href="/admin/diagnostic/{{ diagnostic.id }}/d001">D-001</a>
        <a href="/admin/diagnostic/{{ diagnostic.id }}/d002">D-002</a>
        <a href="/admin/diagnostic/{{ diagnostic.id }}/d003">D-003</a>
        <a href="/admin/diagnostic/{{ diagnostic.id }}/d004">D-004</a>
    </div>

    <section class="card">
        <h2>Клиентская версия</h2>
        <button type="button" onclick="copyText('clientOutput')">
            Скопировать клиентскую версию
        </button>

        <textarea id="clientOutput" readonly>{{ client_output }}</textarea>
    </section>

    <section class="card">
        <h2>Полный внутренний результат</h2>
        <button type="button" onclick="copyText('fullOutput')">
            Скопировать полный результат
        </button>

        <textarea id="fullOutput" readonly>{{ full_output }}</textarea>
    </section>

</div>

<script>
    function copyText(elementId) {
        const element = document.getElementById(elementId);
        element.select();
        element.setSelectionRange(0, 999999);
        document.execCommand("copy");
    }
</script>

</body>
</html>
